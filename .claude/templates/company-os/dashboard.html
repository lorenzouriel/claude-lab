<!DOCTYPE html>
<html lang="{{language}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{company_name}} — OS Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0F1117;
      color: #E8EAF0;
      min-height: 100vh;
      padding: 32px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid #1E2435;
    }
    .header-left h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header-left .tagline {
      color: #8892A0;
      font-size: 0.875rem;
      margin-top: 4px;
    }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1A1F2B;
      border: 1px solid #252B3B;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.8rem;
      color: #8892A0;
    }
    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ADE80;
    }

    /* Main grid */
    .grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 24px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* Panel base */
    .panel {
      background: #1A1F2B;
      border-radius: 16px;
      border: 1px solid #252B3B;
      padding: 24px;
    }
    .panel-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8892A0;
      margin-bottom: 20px;
    }

    /* Company profile panel */
    .company-name {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }
    .tag {
      background: #252B3B;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.75rem;
      color: #C8D0DC;
    }
    .tag.accent {
      background: rgba(129,140,248,0.15);
      color: #818CF8;
    }
    .company-desc {
      font-size: 0.875rem;
      color: #8892A0;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .meta-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .meta-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
    }
    .meta-label { color: #8892A0; }
    .meta-value { color: #C8D0DC; font-weight: 500; }

    /* Skills panel */
    .skills-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .category-section { }
    .category-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8892A0;
      margin-bottom: 10px;
    }
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }

    .skill-card {
      background: #0F1117;
      border: 1px solid #252B3B;
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.15s;
    }
    .skill-card:hover { border-color: #818CF8; }
    .skill-card.pending {
      opacity: 0.5;
      border-style: dashed;
    }
    .skill-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .skill-icon.content  { background: rgba(251,191,36,0.12);  }
    .skill-icon.dev      { background: rgba(96,165,250,0.12);  }
    .skill-icon.marketing{ background: rgba(244,114,182,0.12); }
    .skill-icon.ops      { background: rgba(52,211,153,0.12);  }
    .skill-icon.data     { background: rgba(129,140,248,0.12); }
    .skill-icon.custom   { background: rgba(251,146,60,0.12);  }

    .skill-info { min-width: 0; }
    .skill-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: #E8EAF0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .skill-status {
      font-size: 0.7rem;
      color: #4ADE80;
      margin-top: 2px;
    }
    .skill-status.pending { color: #FBBF24; }

    /* Footer */
    .footer {
      margin-top: 32px;
      text-align: center;
      font-size: 0.75rem;
      color: #3D4555;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <h1>{{company_name}}</h1>
      <p class="tagline">Company OS Dashboard</p>
    </div>
    <div class="header-badge">
      <div class="badge-dot"></div>
      Active
    </div>
  </div>

  <div class="grid">

    <!-- Panel 1: Company Profile -->
    <div class="panel" id="profile-panel">
      <div class="panel-title">Company Profile</div>

      <div class="company-name" id="company-name">{{company_name}}</div>

      <div class="tags" id="company-tags">
        <span class="tag accent" id="profile-type">{{profile_type}}</span>
        <span class="tag" id="industry">{{industry}}</span>
        <span class="tag" id="language">{{language_label}}</span>
      </div>

      <p class="company-desc" id="company-desc">{{tagline}}</p>

      <div class="meta-row">
        <div class="meta-item">
          <span class="meta-label">Skills installed</span>
          <span class="meta-value" id="skill-count">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Custom skills</span>
          <span class="meta-value" id="custom-count">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Wiki sections</span>
          <span class="meta-value" id="wiki-count">4 (PARA)</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Setup date</span>
          <span class="meta-value" id="setup-date">—</span>
        </div>
      </div>
    </div>

    <!-- Panel 2: Skills -->
    <div class="panel" id="skills-panel">
      <div class="panel-title">Installed Skills</div>
      <div class="skills-panel" id="skills-container">
        <!-- Populated by JS -->
      </div>
    </div>

  </div>

  <div class="footer">
    Generated by /workflow:new-company &nbsp;·&nbsp; <span id="footer-date"></span>
  </div>

  <script>
    const CATEGORY_ICONS = {
      content:   { emoji: '✍️', label: 'Content' },
      dev:       { emoji: '💻', label: 'Development' },
      marketing: { emoji: '📣', label: 'Marketing' },
      ops:       { emoji: '⚙️', label: 'Operations' },
      data:      { emoji: '📊', label: 'Data' },
      custom:    { emoji: '🔧', label: 'Custom' },
    };

    function renderDashboard(data) {
      // Counts
      const installed = data.skills.filter(s => s.installed).length;
      const custom    = data.skills.filter(s => s.custom).length;
      document.getElementById('skill-count').textContent = installed;
      document.getElementById('custom-count').textContent = custom;
      document.getElementById('setup-date').textContent =
        new Date(data.generated_at).toLocaleDateString();
      document.getElementById('footer-date').textContent =
        new Date(data.generated_at).toLocaleDateString();

      // Company meta overrides (in case slots weren't filled)
      if (data.company) {
        const c = data.company;
        if (c.name) document.getElementById('company-name').textContent = c.name;
        if (c.tagline) document.getElementById('company-desc').textContent = c.tagline;
        if (c.profile) document.getElementById('profile-type').textContent = c.profile;
        if (c.industry) document.getElementById('industry').textContent = c.industry;
        if (c.language) document.getElementById('language').textContent =
          c.language === 'pt-br' ? 'PT-BR' : c.language.toUpperCase();
      }

      // Group skills by category
      const grouped = {};
      for (const skill of data.skills) {
        const cat = skill.category || 'custom';
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(skill);
      }

      const container = document.getElementById('skills-container');
      container.innerHTML = '';

      const categoryOrder = ['content','dev','marketing','ops','data','custom'];
      for (const cat of categoryOrder) {
        if (!grouped[cat]) continue;
        const info = CATEGORY_ICONS[cat] || { emoji: '📁', label: cat };

        const section = document.createElement('div');
        section.className = 'category-section';
        section.innerHTML = `<div class="category-label">${info.emoji} ${info.label}</div>`;

        const grid = document.createElement('div');
        grid.className = 'skills-grid';

        for (const skill of grouped[cat]) {
          const card = document.createElement('div');
          card.className = 'skill-card' + (skill.installed ? '' : ' pending');

          const icon = document.createElement('div');
          icon.className = `skill-icon ${cat}`;
          icon.textContent = info.emoji;

          const info_el = document.createElement('div');
          info_el.className = 'skill-info';
          info_el.innerHTML = `
            <div class="skill-name">${skill.label}</div>
            <div class="skill-status ${skill.installed ? '' : 'pending'}">
              ${skill.installed ? '✓ Active' : '⏳ Needs setup'}
            </div>
          `;

          card.appendChild(icon);
          card.appendChild(info_el);
          grid.appendChild(card);
        }

        section.appendChild(grid);
        container.appendChild(section);
      }

      if (Object.keys(grouped).length === 0) {
        container.innerHTML = '<p style="color:#8892A0;font-size:0.875rem">No skills installed yet. Run /workflow:new-company to set up skills.</p>';
      }
    }

    // Try to load state.json; fall back to inline data if fetch fails (file:// protocol)
    fetch('./state.json')
      .then(r => r.json())
      .then(renderDashboard)
      .catch(() => {
        // Fallback: look for inline __STATE__ variable set by the generator
        if (typeof __STATE__ !== 'undefined') {
          renderDashboard(__STATE__);
        } else {
          document.getElementById('skills-container').innerHTML =
            '<p style="color:#8892A0;font-size:0.875rem">To view the dashboard, open a terminal in this folder and run:<br><code style="color:#818CF8">python -m http.server 8080</code><br>Then visit <code style="color:#818CF8">http://localhost:8080/dashboard/</code></p>';
        }
      });
  </script>

</body>
</html>
